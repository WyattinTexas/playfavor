<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAVOR Card Audit</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; color: #e0d5c1; font-family: 'Segoe UI', sans-serif; padding: 20px; }
  h1 { text-align: center; color: #d4a843; font-size: 28px; margin-bottom: 8px; }
  .subtitle { text-align: center; color: #8a7a60; margin-bottom: 20px; font-size: 14px; }

  .controls { text-align: center; margin-bottom: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .controls button {
    background: #d4a843; color: #1a1a2e; border: none; padding: 10px 24px;
    font-size: 14px; font-weight: 700; border-radius: 6px; cursor: pointer;
  }
  .controls button:hover { background: #e8c15a; }
  .controls button.secondary { background: #3a3a5e; color: #e0d5c1; }
  .controls button.secondary:hover { background: #4a4a7e; }

  .filter-bar { text-align: center; margin-bottom: 20px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 14px; border-radius: 4px; border: 1px solid #3a3a5e;
    background: #2a2a4e; color: #e0d5c1; cursor: pointer; font-size: 13px;
  }
  .filter-btn.active { background: #d4a843; color: #1a1a2e; border-color: #d4a843; font-weight: 700; }

  .card-grid { display: flex; flex-direction: column; gap: 12px; max-width: 1000px; margin: 0 auto; }

  .card-row {
    display: flex; gap: 16px; align-items: flex-start;
    background: #22223a; border-radius: 8px; padding: 12px;
    border: 2px solid #3a3a5e; transition: opacity 0.3s;
  }
  .card-row.has-data { border-color: #4a8a4a; }
  .card-row.checked { border-color: #2a5a2a; opacity: 0.55; }
  .card-row.checked:hover { opacity: 1; }

  .card-img-wrap { flex-shrink: 0; width: 160px; }
  .card-img-wrap img {
    width: 160px; border-radius: 6px; display: block;
    cursor: pointer; transition: transform 0.2s;
  }
  .card-img-wrap img:hover { transform: scale(1.05); }

  .card-info { flex: 1; min-width: 0; }
  .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
  .card-name { font-size: 18px; font-weight: 700; color: #d4a843; }
  .check-btn {
    padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 700;
    cursor: pointer; border: 1px solid #3a5a3a; background: #1a3a1a; color: #6a9a6a;
    flex-shrink: 0;
  }
  .check-btn.done { background: #2a6a2a; color: #aaffaa; border-color: #4a8a4a; }
  .card-meta { font-size: 12px; color: #8a7a60; margin-bottom: 8px; }
  .card-meta span { margin-right: 12px; }

  .card-current { font-size: 12px; color: #6a6a8a; margin-bottom: 8px; line-height: 1.4; }
  .card-current b { color: #8a8aaa; }

  textarea {
    width: 100%; min-height: 80px; background: #16162a; color: #e0d5c1;
    border: 1px solid #3a3a5e; border-radius: 4px; padding: 8px;
    font-family: 'Segoe UI', sans-serif; font-size: 13px; resize: vertical;
  }
  textarea:focus { outline: none; border-color: #d4a843; }
  textarea::placeholder { color: #4a4a6a; }

  .type-badge {
    display: inline-block; padding: 2px 8px; border-radius: 3px;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
  }
  .type-endeavor { background: #2a6a3a; color: #8fdf8f; }
  .type-potion { background: #6a2a6a; color: #df8fdf; }
  .type-weapon { background: #5a5a5a; color: #c0c0c0; }
  .type-artifact { background: #6a5a2a; color: #dfcf8f; }
  .type-wisdom { background: #2a4a6a; color: #8fbfdf; }
  .type-adventure { background: #6a3a2a; color: #df9f8f; }
  .type-mission { background: #8a6a2a; color: #ffe08a; }

  .section-header {
    font-size: 20px; font-weight: 700; color: #d4a843; margin: 30px 0 10px;
    text-align: center; max-width: 1000px; margin-left: auto; margin-right: auto;
    border-bottom: 1px solid #3a3a5e; padding-bottom: 8px;
  }

  .lightbox {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
    cursor: pointer;
  }
  .lightbox.active { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

  .counter { text-align: center; color: #8a7a60; font-size: 13px; margin-bottom: 16px; }
  .progress-bar { max-width: 400px; margin: 0 auto 16px; height: 8px; background: #2a2a4e; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: #4a8a4a; transition: width 0.3s; border-radius: 4px; }
</style>
</head>

// Apply preloaded data if not already in userData
(function applyPreloaded() {
  let changed = false;
  for (const [name, val] of Object.entries(PRELOADED)) {
    const card = ALL_ITEMS.find(c => c.name === name);
    if (card && !userData[card.filename]) {
      userData[card.filename] = val;
      checkedCards[card.filename] = true;
      changed = true;
    }
  }
  if (changed) { save(); saveChecked(); }
})();

function save() {
  localStorage.setItem('favor_card_audit', JSON.stringify(userData));
}
function saveChecked() {
  localStorage.setItem('favor_card_checked', JSON.stringify(checkedCards));
}

function buildFilterBar() {
  const bar = document.getElementById('filterBar');
  bar.innerHTML = TYPES.map(t => {
    const label = t === 'all' ? 'All Cards' : t.charAt(0).toUpperCase() + t.slice(1) + 's';
    const count = t === 'all' ? ALL_ITEMS.length : ALL_ITEMS.filter(c => c.type === t).length;
    return `<button class="filter-btn ${t === activeFilter ? 'active' : ''}" onclick="setFilter('${t}')">${label} (${count})</button>`;
  }).join('');
}

function setFilter(type) {
  activeFilter = type;
  buildFilterBar();
  render();
}

function toggleChecked() {
  hideChecked = !hideChecked;
  render();
}

function toggleCheck(filename) {
  checkedCards[filename] = !checkedCards[filename];
  saveChecked();
  render();
}

function fmtSkills(skills) {
  if (!skills || skills.length === 0) return 'none';
  const counts = {};
  skills.forEach(s => counts[s] = (counts[s]||0) + 1);
  return Object.entries(counts).map(([s,c]) => c > 1 ? `${c}x ${s}` : s).join(', ');
}

function fmtReqs(reqs) {
  if (!reqs || reqs.length === 0) return 'none';
  const counts = {};
  reqs.forEach(s => counts[s] = (counts[s]||0) + 1);
  return Object.entries(counts).map(([s,c]) => c > 1 ? `${c}x ${s}` : s).join(', ');
}

function fmtRewards(r, card) {
  const parts = [];
  if (r && r.gold) parts.push(`${r.gold}g`);
  if (r && r.prestige) parts.push(`${r.prestige} prestige`);
  if (r && r.scorn) parts.push(`${r.scorn} scorn`);
  if (r && r.favor) parts.push(`${r.favor} favor`);
  if (card.favor) parts.push(`${card.favor} favor`);
  return parts.length ? parts.join(', ') : 'none';
}

function renderCard(card) {
  const val = userData[card.filename] || '';
  const hasData = val.trim().length > 0;
  const isChecked = !!checkedCards[card.filename];
  const fnEsc = card.filename.replace(/'/g, "\\'");
  const imgPath = `assets/cards/${card.imgDir}/${encodeURIComponent(card.filename)}`;

  let currentInfo = '';
  if (card.type === 'mission') {
    currentInfo = `
      <b>Reqs:</b> ${fmtReqs(card.requirements)} &nbsp;|&nbsp;
      <b>Activation:</b> Round ${card.activationRound}<br>
      <b>Success:</b> ${fmtRewards(card.successRewards, {})} &nbsp;|&nbsp;
      <b>Failure:</b> ${card.failurePenalties.scorn} scorn
      ${card.flavorText ? `<br><b>Combo:</b> ${card.flavorText}` : ''}
    `;
  } else {
    currentInfo = `
      <b>Skills:</b> ${fmtSkills(card.skills)} &nbsp;|&nbsp;
      <b>Reqs:</b> ${fmtReqs(card.requirements)} &nbsp;|&nbsp;
      <b>Rewards:</b> ${fmtRewards(card.rewards, card)}
      ${card.special ? `<br><b>Special:</b> ${card.special}` : ''}
    `;
  }

  return `
    <div class="card-row ${hasData ? 'has-data' : ''} ${isChecked ? 'checked' : ''}">
      <div class="card-img-wrap">
        <img src="${imgPath}" alt="${card.name}"
             onclick="document.getElementById('lightboxImg').src=this.src; document.getElementById('lightbox').classList.add('active');">
      </div>
      <div class="card-info">
        <div class="card-header">
          <div class="card-name">${card.name}</div>
          <button class="check-btn ${isChecked ? 'done' : ''}" onclick="toggleCheck('${fnEsc}')">
            ${isChecked ? 'DONE' : 'Mark Done'}
          </button>
        </div>
        <div class="card-meta">
          <span class="type-badge type-${card.type}">${card.type}</span>
          <span>Act ${card.act}</span>
          ${card.cost !== null && card.cost !== undefined ? `<span>Cost: ${card.cost}g</span>` : ''}
          ${card.combo ? `<span>Combo: ${card.combo}</span>` : ''}
        </div>
        <div class="card-current">${currentInfo}</div>
        <textarea placeholder="Corrections / notes for ${card.name}..."
                  onchange="userData['${fnEsc}'] = this.value; save();"
                  oninput="userData['${fnEsc}'] = this.value; save();"
        >${val}</textarea>
      </div>
    </div>
  `;
}

function render() {
  const sections = document.getElementById('cardSections');
  let filtered = activeFilter === 'all' ? ALL_ITEMS : ALL_ITEMS.filter(c => c.type === activeFilter);
  if (hideChecked) filtered = filtered.filter(c => !checkedCards[c.filename]);

  const totalAll = ALL_ITEMS.length;
  const checkedCount = ALL_ITEMS.filter(c => checkedCards[c.filename]).length;
  const filledCount = filtered.filter(c => userData[c.filename] && userData[c.filename].trim()).length;
  const checkedFiltered = filtered.filter(c => checkedCards[c.filename]).length;

  document.getElementById('counter').textContent =
    `Showing ${filtered.length} cards | ${filledCount} with data | ${checkedFiltered} done | Overall: ${checkedCount}/${totalAll} complete`;
  document.getElementById('progressFill').style.width = `${(checkedCount / totalAll * 100).toFixed(1)}%`;

  // Split into regular cards and missions
  const regularCards = filtered.filter(c => c.type !== 'mission');
  const missionCards = filtered.filter(c => c.type === 'mission');

  let html = '';

  if (regularCards.length > 0) {
    html += '<div class="section-header">Regular Cards</div>';
    html += '<div class="card-grid">' + regularCards.map(renderCard).join('') + '</div>';
  }

  if (missionCards.length > 0) {
    html += '<div class="section-header">Mission Cards</div>';
    html += '<div class="card-grid">' + missionCards.map(renderCard).join('') + '</div>';
  }

  sections.innerHTML = html;
}

function exportData() {
  const filled = {};
  Object.entries(userData).forEach(([k, v]) => {
    if (v && v.trim()) {
      const card = ALL_ITEMS.find(c => c.filename === k);
      filled[card ? card.name : k] = v.trim();
    }
  });
  const json = JSON.stringify(filled, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'favor-card-audit.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        Object.entries(data).forEach(([name, val]) => {
          const card = ALL_ITEMS.find(c => c.name === name);
          if (card) userData[card.filename] = val;
          else userData[name] = val;
        });
        save();
        render();
      } catch(err) { alert('Invalid JSON file'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function clearAll() {
  if (!confirm('Clear all audit data and checked states?')) return;
  userData = {};
  checkedCards = {};
  save();
  saveChecked();
  render();
}

buildFilterBar();
render();
</script>
</body>
</html>
