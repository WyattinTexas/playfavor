<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FAVOR — ambient menu preview</title>
<!-- ambient.js loads the bg image by a page-relative path for its occlusion
     patch; base ../ makes this page resolve assets exactly like index.html
     does. Without it the patch 404s and birds fly IN FRONT of the cottage. -->
<base href="../">
<style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #2a3a28; }
    #title-screen { position: absolute; inset: 0; }
    /* Mirror of the real .ts-bg + #tsAmbient — keep in sync with style.css */
    .ts-bg {
        position: absolute; inset: 0;
        background: #2a3a28 url('assets/ui/menu-meadow.jpg') no-repeat;
        background-size: cover;
        background-position: 68% 34%;
    }
    #tsAmbient { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
    .bar { position: fixed; bottom: 10px; left: 10px; z-index: 9; display: flex; flex-wrap: wrap; gap: 6px; max-width: 96vw; }
    .bar button {
        font: 700 12px/1.5 Georgia, serif; color: #f4e6c0; background: rgba(30, 22, 12, 0.82);
        border: 1px solid #a8873f; border-radius: 8px; padding: 5px 11px; cursor: pointer;
    }
    .bar button.off { opacity: 0.45; border-color: #6b5a33; text-decoration: line-through; }
</style>
</head>
<body>
    <!-- ambient.js gates on #title-screen visibility and draws on #tsAmbient -->
    <div id="title-screen">
        <div class="ts-bg"></div>
        <canvas id="tsAmbient"></canvas>
    </div>
    <div class="bar" id="toggleBar">
        <button onclick="window._ambientFlockNow()">Flock now ▸</button>
    </div>
    <script src="js/ambient.js?v=20260720e"></script>
    <script>
        // One on/off chip per ambient element, live-flipping the flags in
        // ambient.js via the _ambientToggle dev hook. URL presets:
        //   ?only=petals,sparkle   start with just those elements on
        //   ?off=birds,smoke       start with those elements off
        (function buildToggles() {
            if (!window._ambientGet) { setTimeout(buildToggles, 50); return; }
            const q = new URLSearchParams(location.search);
            const only = (q.get('only') || '').split(',').filter(Boolean);
            const off = (q.get('off') || '').split(',').filter(Boolean);
            Object.entries(window._ambientGet()).forEach(([key, on]) => {
                const want = only.length ? only.includes(key) : !off.includes(key);
                if (on !== want) window._ambientToggle(key);
            });
            const bar = document.getElementById('toggleBar');
            Object.entries(window._ambientGet()).forEach(([key, on]) => {
                const b = document.createElement('button');
                b.textContent = key;
                if (!on) b.classList.add('off');
                b.onclick = () => b.classList.toggle('off', !window._ambientToggle(key));
                bar.appendChild(b);
            });
        })();
    </script>
    <script>
        // ?flock=1 spawns a flock immediately (headless captures use this).
        // Optional deterministic overrides: &y=0.15 (baseY as h-fraction),
        // &dir=-1, &dur=16000 — so a capture can aim the flock at the cottage.
        (function () {
            const q = new URLSearchParams(location.search);
            if (!q.get('flock')) return;
            const opts = {};
            if (q.get('y')) opts.baseY = parseFloat(q.get('y')) * innerHeight;
            if (q.get('dir')) opts.dir = parseInt(q.get('dir'), 10);
            if (q.get('dur')) opts.dur = parseInt(q.get('dur'), 10);
            if (q.get('y')) opts.drift = 0;
            const arm = () => window._ambientFlockNow
                ? window._ambientFlockNow(opts) : setTimeout(arm, 50);
            setTimeout(arm, 300);
        })();
    </script>
</body>
</html>
