<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>FAVOR</title>
<style>
    html, body {
        margin: 0; height: 100%;
        background: radial-gradient(ellipse at 50% 40%, #3a2214 0%, #1d1106 70%);
        color: #ffd97a;
        font-family: Georgia, serif;
        display: flex; align-items: center; justify-content: center;
    }
    .card { text-align: center; }
    h1 { font-size: 26px; letter-spacing: 1px; margin: 0 0 8px; }
    p { font-style: italic; color: rgba(240,230,211,0.7); margin: 0 0 22px; }
    button {
        font-family: Georgia, serif; font-weight: bold; font-size: 17px;
        color: #2b1a06; background: linear-gradient(#f4d488, #c99f4b);
        border: 1px solid #8a6a2a; border-radius: 999px;
        padding: 11px 30px; cursor: pointer;
    }
    button:hover { filter: brightness(1.08); }
</style>
</head>
<body>
    <div class="card">
        <h1>The Realm Is Unreachable</h1>
        <p>Check your connection, then try again.</p>
        <button onclick="location.href='https://playfavor.net/'">Return to the Table</button>
    </div>
</body>
</html>
