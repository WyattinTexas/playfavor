<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FAVOR — Melee Reveal Preview</title>
<!-- ?v= stamped by the deploy bump (same as index.html) — without it, GitHub
     Pages' ~10-min cache serves STALE js/css here and fixes look unshipped. -->
<link rel="stylesheet" href="../css/style.css?v=20260713191813">
<!-- Melee cinematic styling lives in its own file since the testrealm GAME was
     reset to the testrealm2 build (whose style.css has a different .ms-* splash).
     Loaded AFTER style.css so these .ms-* rules win here in the preview. -->
<link rel="stylesheet" href="../css/melee.css?v=20260713191813">
<style>
  html, body { margin: 0; height: 100%; background: #140a04; font-family: 'Cinzel', serif; }
  .pv-bar {
    position: fixed; z-index: 20000; top: 0; left: 0; right: 0;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: center;
    padding: 8px 12px; background: rgba(10,5,2,0.82); border-bottom: 1px solid rgba(201,168,76,0.3);
  }
  .pv-bar b { color: #e8d48b; letter-spacing: 2px; font-size: 12px; margin-right: 6px; text-transform: uppercase; }
  .pv-btn {
    font-family: 'Cinzel', serif; font-size: 12px; font-weight: 700; letter-spacing: 1px;
    color: #e8d48b; background: rgba(201,168,76,0.10); border: 1px solid rgba(201,168,76,0.4);
    border-radius: 16px; padding: 5px 13px; cursor: pointer;
  }
  .pv-btn:hover { color: #fff4d2; border-color: #e8d48b; background: rgba(201,168,76,0.2); }
  .pv-btn.on { background: rgba(201,168,76,0.28); color: #fff4d2; }
  .pv-note { color: rgba(201,168,76,0.7); font-size: 11px; }
  /* The toolbar is a DRAWER so the stage can be tested full-screen on a
     phone: it slides away, leaving only the ⚙ handle. Starts closed on
     short (landscape-phone) viewports. */
  .pv-bar { transition: transform 0.25s ease, opacity 0.25s ease; }
  .pv-bar.closed { transform: translateY(-105%); opacity: 0; pointer-events: none; }
  .pv-toggle {
    position: fixed; top: 8px; left: 10px; z-index: 20001;
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; color: #e8d48b; cursor: pointer;
    background: rgba(10,5,2,0.75); border: 1px solid rgba(201,168,76,0.45);
  }
  .pv-toggle:hover { color: #fff4d2; border-color: #e8d48b; }
  /* The overlay lives here just like #meleeSplash does in the game. */
  #meleeSplash { }
  /* Skip chip clears the drawer only while it's open (in-game: no toolbar). */
  #meleeSplash .ms-skip { top: 10px; }
  body.pv-open #meleeSplash .ms-skip { top: 104px; }
</style>
</head>
<body>

  <button class="pv-toggle" id="pvToggle" title="Show/hide test controls">⚙</button>
  <div class="pv-bar" id="pvBar">
    <b>Melee Preview</b>
    <button class="pv-btn on" data-count="3">3 Players</button>
    <button class="pv-btn" data-count="4">4 Players</button>
    <button class="pv-btn" data-count="5">5 Players</button>
    <span class="pv-note">|</span>
    <span class="pv-note">Ties:</span>
    <button class="pv-btn on" data-tie="none">None</button>
    <button class="pv-btn" data-tie="first">1st</button>
    <button class="pv-btn" data-tie="second">2nd</button>
    <button class="pv-btn" data-tie="both">1st+3rd</button>
    <button class="pv-btn" data-tie="all">All</button>
    <button class="pv-btn" id="pvReplay">▶ Replay</button>
    <span class="pv-note">|</span>
    <button class="pv-btn on" id="pvSap">Sap FX</button>
    <button class="pv-btn on" id="pvCards">Cards→Meter</button>
    <span class="pv-note">|</span>
    <button class="pv-btn on" data-speed="1">Normal</button>
    <button class="pv-btn" data-speed="1.8">Slow</button>
    <button class="pv-btn" data-speed="0.6">Fast</button>
  </div>

  <div id="meleeSplash"></div>

  <script src="../js/melee.js?v=20260714150555"></script>
  <script>
    // Mock data mirrors the engine's resolveMelee() output shape exactly:
    // { playerIndex, name, power, placement, prestige }, sorted power-desc.
    const CHARS = [
      { file: 'Explorer.jpg',  name: 'You' },
      { file: 'Knight.jpg',    name: 'Prince Aldric' },
      { file: 'Duchess.jpg',   name: 'Princess Sera' },
      { file: 'Bandit.jpg',    name: 'Lord Cassius' },
      { file: 'Magician.jpg',  name: 'Lady Elara' },
    ];
    // Act 1 melee prestige by placement (matches MELEE_REWARDS act 1).
    const PRESTIGE = { 1: 5, 2: 3, 3: 1 };
    // VERIFIED power contributors — name/filename/pips checked against
    // data/cards.js (filenames often don't match card names; an earlier demo
    // pick by filename landed on Philosopher's Stone art, which grants none).
    const POWER_ONES = [
      { name: 'Tombstone',   filename: 'Beat Stick Card.jpg',  pips: 1 },
      { name: "Ol' Bessy",   filename: 'Ol_ Bessy Card.jpg',   pips: 1 },
      { name: 'Training Friend', filename: 'Training Friend.jpg', pips: 1 },
      { name: 'Deadeye',     filename: 'All Seer Card.jpg',    pips: 1 },  // audit fix 2026-07-10
    ];
    const POWER_TWOS = [
      { name: 'Shark Tooth',       filename: 'Dusty Card.jpg',              pips: 2 },
      { name: 'Reckless Training', filename: 'Reckless Training Card.jpg',  pips: 2 },
      { name: 'Blackbird',         filename: 'Teather Bark Card.jpg',       pips: 2 },
      { name: "Heaven's Blade",    filename: 'Griffin Talons Card.jpg',     pips: 2 },
      { name: 'Wild Steel',        filename: 'Seeker Goggles Card.jpg',     pips: 2 },
      { name: 'Guardian',          filename: 'Guardian Card.jpg',           pips: 2 },
    ];
    // A real mission whose success reward grants power (missions art folder).
    const POWER_MISSION = { name: 'Mounted Champion', filename: 'Act 2_To Believe in Someone Card.jpg', pips: 3 };

    let count = 3, speed = 1, tieMode = 'none', sapFx = true, cardsFx = true;

    function portraitFor(pi) { return '../assets/characters/' + CHARS[pi].file; }
    // Mock slider slots so the ring shows at varied positions per fighter.
    const SLOTS = [0, 2, 4, 1, 3];

    // ── One coherent scenario, mirroring powerBreakdown v2 exactly ──────
    // Fighter 0 is the CHAMPION and the Fuzzy Head caster (the card shows
    // only in their row; red bolts wound everyone else). ownRaw per fighter
    // is composed from real cards; rawTotal = ownRaw + wounds (may be
    // NEGATIVE); results.power = max(0, rawTotal) — the floored final tally.
    // The spread exercises every tier: platinum 21+, gold 16-20, bright
    // 11-15, drab ≤10, plus a negative-raw lock that podiums at 0.
    function buildScenario() {
      const rnd = (n) => Math.floor(Math.random() * n);
      const casterPi = 0;
      const plan = [];
      // per seat: target ownRaw + own steps
      for (let piIdx = 0; piIdx < count; piIdx++) {
        const p = { pi: piIdx, steps: [], mult: false, coin: null };
        if (piIdx === 0) {          // platinum champ, ×2, casts Fuzzy Head
          p.ownRaw = 22 + rnd(4) * 2;                 // even → clean ×2
          p.mult = true;
        } else if (piIdx === 1) {   // gold via a WON coin
          p.ownRaw = 20 + rnd(3);                     // raw 17-19 after −3
          p.coin = { won: true };
        } else if (piIdx === 2) {   // bright
          p.ownRaw = 15 + rnd(2);                     // raw 12-13
        } else if (piIdx === 3) {   // negative lock → 0 at the tally
          p.ownRaw = 1 + rnd(2);                      // raw −2..−1
          p.coin = { won: false };
        } else {                    // drab
          p.ownRaw = 10 + rnd(2);                     // raw 7-8
        }
        plan.push(p);
      }
      // Tie modes sculpt FINAL powers (non-casters carry the −3 wound, the
      // caster doesn't): equal finals = shared placement in the builder below.
      if (tieMode === 'first' && count >= 2) plan[1].ownRaw = plan[0].ownRaw + 3;      // co-champions
      if (tieMode === 'second' && count >= 3) plan[2].ownRaw = plan[1].ownRaw;         // shared silver
      if (tieMode === 'both') {                                                        // 1st AND 3rd tied
        if (count >= 2) plan[1].ownRaw = plan[0].ownRaw + 3;
        if (count >= 4) plan[3].ownRaw = plan[2].ownRaw;
      }
      if (tieMode === 'all') plan.forEach(p => { if (p.pi !== 0) p.ownRaw = plan[0].ownRaw + 3; });

      // raw + floored power
      plan.forEach(p => {
        p.wound = (p.pi === casterPi) ? 0 : -3;
        p.raw = p.ownRaw + p.wound;
        p.power = Math.max(0, p.raw);
      });

      // placements from floored powers
      const order = plan.slice().sort((a, b) => b.power - a.power);
      const results = [];
      let placement = 1, i = 0;
      while (i < order.length) {
        const tied = [order[i]];
        while (i + 1 < order.length && order[i + 1].power === order[i].power) { i++; tied.push(order[i]); }
        tied.forEach(p => results.push({
          playerIndex: p.pi, name: CHARS[p.pi].name, power: p.power,
          placement, prestige: PRESTIGE[placement] || 0
        }));
        placement += tied.length; i++;
      }

      // breakdowns
      const bds = {};
      let missionUsed = false;
      plan.forEach(p => {
        const steps = [];
        // preBase: what the board+cards must sum to BEFORE own modifiers
        let preBase = p.ownRaw;
        if (p.mult) preBase = preBase / 2;
        if (p.coin && p.coin.won) preBase -= 4;
        preBase = Math.max(0, preBase);

        if (p.coin) steps.push({ kind: 'coinflip', label: 'Shot of Courage', amount: 4, won: p.coin.won, filename: 'Liquid Wind Card.jpg' });
        if (p.mult) steps.push({ kind: 'mult', label: 'Melee Spectacular', amount: 2, filename: 'Aerial Spectacular Card.jpg' });
        if (p.pi === casterPi) {
          steps.push({
            kind: 'attack', label: 'Fuzzy Head', amount: -3,
            filename: 'Cursed Coating Card.jpg',
            hits: plan.filter(q => q.pi !== casterPi).map(q => ({ playerIndex: q.pi, delta: -3 }))
          });
        }

        // compose preBase from board share + real cards
        const baseCards = [];
        let remaining = preBase;
        let baseOther = remaining > 3 ? 1 + (remaining > 8 ? 1 : 0) : 0;
        remaining -= baseOther;
        if (!missionUsed && remaining >= POWER_MISSION.pips) {
          baseCards.push({ name: POWER_MISSION.name, filename: POWER_MISSION.filename, amount: POWER_MISSION.pips, mission: true });
          remaining -= POWER_MISSION.pips; missionUsed = true;
        }
        let ti = p.pi, oi = p.pi;
        while (remaining >= 2 && baseCards.length < 5) {
          const c = POWER_TWOS[ti++ % POWER_TWOS.length];
          baseCards.push({ name: c.name, filename: c.filename, amount: c.pips, mission: false });
          remaining -= c.pips;
        }
        if (remaining >= 1 && baseCards.length < 6) {
          const c = POWER_ONES[oi % POWER_ONES.length];
          baseCards.push({ name: c.name, filename: c.filename, amount: c.pips, mission: false });
          remaining -= c.pips;
        }
        baseOther += remaining;

        bds[p.pi] = {
          base: preBase, baseOther, baseCards, steps,
          ownRawTotal: p.ownRaw, rawTotal: p.raw,
          sliderPosition: SLOTS[p.pi % SLOTS.length],
          computedTotal: p.power
        };
      });
      return { results, bds };
    }

    function play() {
      const host = document.getElementById('meleeSplash');
      const { results, bds } = buildScenario();
      // playMeleeCinematic cancels any prior run on this host and re-renders,
      // so a speed change can't leave old timers wiping the new cards.
      // autoCloseMs:0 → it waits for a click instead of vanishing on its own.
      playMeleeCinematic(host, results, 1, {
        speed, portraitFor, sapFx, cardsFx, autoCloseMs: 0,
        powerIcon: '../assets/icons/power.png',
        ringSrc: '../assets/ui/slider-ring.png',
        breakdownFor: (pi) => bds[pi],
        cardImgFor: (filename, mission) => (filename ? '../assets/cards/' + (mission ? 'missions/' : 'regular/') + filename : null),
        prestigeTokenFor: (d) => (d === 25
          ? '../assets/tokens/Tokens_Design_v1_Prestige_25_v1.jpg'
          : '../assets/tokens/Copy of Tokens_Design_v1_Prestige_' + d + '_v1.jpg')
      });
    }

    // Controls
    document.querySelectorAll('[data-count]').forEach(b => b.onclick = () => {
      document.querySelectorAll('[data-count]').forEach(x => x.classList.remove('on'));
      b.classList.add('on'); count = +b.dataset.count; play();
    });
    document.querySelectorAll('[data-speed]').forEach(b => b.onclick = () => {
      document.querySelectorAll('[data-speed]').forEach(x => x.classList.remove('on'));
      b.classList.add('on'); speed = +b.dataset.speed; play();
    });
    document.querySelectorAll('[data-tie]').forEach(b => b.onclick = () => {
      document.querySelectorAll('[data-tie]').forEach(x => x.classList.remove('on'));
      b.classList.add('on'); tieMode = b.dataset.tie; play();
    });
    document.getElementById('pvSap').onclick = (e) => { sapFx = !sapFx; e.target.classList.toggle('on', sapFx); play(); };
    document.getElementById('pvCards').onclick = (e) => { cardsFx = !cardsFx; e.target.classList.toggle('on', cardsFx); play(); };
    document.getElementById('pvReplay').onclick = play;

    // Drawer: starts closed on landscape-phone-sized screens so the stage can
    // be judged full-bleed; the ⚙ handle toggles it any time.
    const pvBar = document.getElementById('pvBar');
    const setDrawer = (open) => {
      pvBar.classList.toggle('closed', !open);
      document.body.classList.toggle('pv-open', open);
    };
    document.getElementById('pvToggle').onclick = () => setDrawer(pvBar.classList.contains('closed'));
    setDrawer(!matchMedia('(max-height: 540px)').matches);

    play();
  </script>
</body>
</html>
